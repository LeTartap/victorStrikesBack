services:
  api:
    build: ./api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SQLITE_PATH: /data/strikes.db
      BOOTSTRAP_DAVID_USERNAME: ${BOOTSTRAP_DAVID_USERNAME:-}
      BOOTSTRAP_DAVID_PASSWORD: ${BOOTSTRAP_DAVID_PASSWORD:-}
      SESSION_DAYS: ${SESSION_DAYS:-7}
    volumes:
      - strikes-data:/data

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  strikes-data:
